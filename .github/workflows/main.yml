name: Python install Demo

on: 
 workflow_dispatch:

jobs:
  python-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
           python-vesion: '3.11'
      - name: Check Python Version
        run: python --version

      - name : Runing Python app.py
        run : python app.py
        
      
